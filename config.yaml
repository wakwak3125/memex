# memex configuration

vault:
  path: ~/Documents/Note/00-memex/

slack:
  watch_channels:
    - name: "pd-emr-k部"
      limit: 20
    - name: "pd-emr-eiyou"
      limit: 20
    - name: "pd-backend"
      limit: 20
    - name: "pd-frontend"
      limit: 20
    - name: "all-thank-you"
      limit: 15
    - name: "all-announcement"
      limit: 15
    - name: "management"
      limit: 15

notion:
  watch_pages:
    - url: "https://www.notion.so/henry-inc/EMR-Eiyou-Daily-3407fab7f4e680cb856dd8b7e6fcb89e"
      prompt: |
        Daily Standupの議事録です。TODOやチーム全体で注力すべきポイント・相談事を把握するために使います。
        日付ごとにH2ブロックセクションがあり、その中にチームメンバーのデイリーの進捗が書かれています。
        その日付のsnapshotとして standup.md に重要事項を書き出してください。個別の進捗を転記する必要はありません。
    - url: "https://www.notion.so/henry-inc/76ef9eff7d174ccca3a199c44bd83f98"
      prompt: |
        個人のメモDBです。
        inbox/notion/{page_title}.md に構造化して書き出してください。
    - url: "https://www.notion.so/henry-inc/2ee7fab7f4e680488d18fe8307bcc3e0"
      prompt: |
        人事制度・評価制度のドキュメントです。
        以下の観点で context/evaluation-criteria.md に構造化して書き出してください:
        - グレード定義（各グレードの期待役割・スキル要件）
        - 評価基準（何がどう評価されるか）
        - 評価サイクル（時期・プロセス・決定者）
        - 昇格条件（次のグレードに上がるために必要なこと）
        自分の現在のグレードと次のグレードの差分が明確になるように整理すること。

